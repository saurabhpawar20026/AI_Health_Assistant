<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input[type="text"] { width: 95%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>AI Health Assistant</h2>
    <p>Enter your symptoms (e.g., fever, headache, cough):</p>
    <input type="text" id="symptoms" placeholder="Type symptoms here...">
    <button onclick="getPrediction()">Predict Disease</button>

    <div class="result" id="result-box">
        <strong>Predicted Disease:</strong> <span id="disease-name"></span><br><br>
        <strong>Advice/Precautions:</strong> <span id="precaution-text"></span>
    </div>
</div>

<script>
    function getPrediction() {
        let symptoms = document.getElementById("symptoms").value;
        if(symptoms.trim() === "") { alert("Please enter symptoms!"); return; }

        fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symptoms: symptoms })
        })
        .then(response => response.json())
        .then(data => {
            if(data.error) { alert(data.error); return; }
            document.getElementById("disease-name").innerText = data.disease;
            document.getElementById("precaution-text").innerText = data.precaution;
            document.getElementById("result-box").style.display = "block";
        });
    }
</script>

</body>
</html>
